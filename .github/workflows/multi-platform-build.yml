name: Cross-Platform Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: ffmpeg-tool-windows
          - os: macos-latest
            artifact_name: ffmpeg-tool-macos

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl

    # 重点修正：分平台下载并解压组件
    - name: Download and Setup FFmpeg
      shell: bash
      run: |
        mkdir -p ffmpeg
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          # Windows: 从 BtbN 下载（包含 ffmpeg 和 ffprobe）
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          unzip -j ffmpeg.zip '**/bin/ffmpeg.exe' '**/bin/ffprobe.exe' -d ffmpeg/
        else
          # macOS: 从 Evermeet 分别下载 ffmpeg 和 ffprobe（因为它们不在同一个包里）
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip -o ffmpeg_mac.zip
          unzip -j ffmpeg_mac.zip -d ffmpeg/
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip -o ffprobe_mac.zip
          unzip -j ffprobe_mac.zip -d ffmpeg/
          chmod +x ffmpeg/ffmpeg ffmpeg/ffprobe
        fi

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # 使用 --noconsole 对应 .pyw 的需求
        pyinstaller --noconsole --onefile --name "VideoTool" ffmpeg_tool.pyw

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # macOS 打包为 .app 
        pyinstaller --windowed --name "VideoTool" ffmpeg_tool.pyw

    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p release_dist
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cp dist/VideoTool.exe release_dist/
          cp -r ffmpeg release_dist/
        else
          # 保持 ffmpeg 文件夹与 .app 同级，符合代码 get_bin_path 逻辑
          cp -r dist/VideoTool.app release_dist/
          cp -r ffmpeg release_dist/
        fi

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release_dist/