name: Cross-Platform Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]     # 推荐：推送 tag 时触发自动发布
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 1. Windows x64
          - os: windows-latest
            os_name: windows-x64
            artifact_name: VideoTool_Windows_x64
          # 2. macOS x86_64 (Intel)
          - os: macos-15-intel
            os_name: macos-intel
            artifact_name: VideoTool_macOS_Intel
          # 3. macOS ARM64 (Apple Silicon M1/M2/M3)
          - os: macos-14
            os_name: macos-arm64
            artifact_name: VideoTool_macOS_AppleSilicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl

      # ================= 下载与配置 FFmpeg =================
      - name: Download FFmpeg (Windows)
        if: matrix.os_name == 'windows-x64'
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_temp
          New-Item -ItemType Directory -Force -Path Release\ffmpeg
          Move-Item -Path ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe -Destination Release\ffmpeg\
          Move-Item -Path ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe -Destination Release\ffmpeg\

      - name: Download FFmpeg (macOS Intel)
        if: matrix.os_name == 'macos-intel'
        run: |
          mkdir -p Release/ffmpeg
          curl -L -o ffmpeg.zip https://www.osxexperts.net/ffmpeg71intel.zip
          curl -L -o ffprobe.zip https://www.osxexperts.net/ffprobe71intel.zip
          unzip ffmpeg.zip -d Release/ffmpeg/
          unzip ffprobe.zip -d Release/ffmpeg/
          chmod +x Release/ffmpeg/ffmpeg Release/ffmpeg/ffprobe

      - name: Download FFmpeg (macOS ARM64)
        if: matrix.os_name == 'macos-arm64'
        run: |
          mkdir -p Release/ffmpeg
          curl -L -o ffmpeg.zip https://www.osxexperts.net/ffmpeg71arm.zip
          curl -L -o ffprobe.zip https://www.osxexperts.net/ffprobe71arm.zip
          unzip ffmpeg.zip -d Release/ffmpeg/
          unzip ffprobe.zip -d Release/ffmpeg/
          chmod +x Release/ffmpeg/ffmpeg Release/ffmpeg/ffprobe

      # ================= 编译打包可执行文件 =================
      - name: Build Executable with PyInstaller
        run: pyinstaller --noconsole --onefile video_tool.pyw

      # ================= 整理产物并压缩成 Zip =================
      - name: Prepare and Zip Release Folder (Windows)
        if: matrix.os_name == 'windows-x64'
        run: |
          Move-Item -Path dist\video_tool.exe -Destination Release\
          # 使用 PowerShell 将 Release 文件夹内的内容打包
          Compress-Archive -Path Release\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Prepare and Zip Release Folder (macOS)
        if: startsWith(matrix.os_name, 'macos')
        run: |
          mv dist/video_tool.app Release/
          # 进入 Release 文件夹打包，确保解压后直接是 app 和 ffmpeg 文件夹，而不是多套一层 Release 目录
          cd Release
          zip -r ../${{ matrix.artifact_name }}.zip ./*
          cd ..

      - name: Upload Artifact to Actions
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip # 直接上传压缩包

  # ================= 汇总并发布到 Release =================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: final-artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: final-artifacts/*.zip
          generate_release_notes: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}