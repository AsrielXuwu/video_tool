name: Video Tool Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0 等标签时触发发布
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write # 赋予创建 Release 的权限

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: VideoTool-Windows
          - os: macos-latest
            artifact_name: VideoTool-macOS

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl

    # 关键：根据平台下载并准备 FFmpeg 组件
    - name: Download FFmpeg
      shell: bash
      run: |
        mkdir -p ffmpeg
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          unzip -j ffmpeg.zip '**/bin/ffmpeg.exe' '**/bin/ffprobe.exe' -d ffmpeg/
        else
          # macOS 需要分别下载两个核心组件
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip -o ffmpeg_mac.zip
          unzip -j ffmpeg_mac.zip -d ffmpeg/
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip -o ffprobe_mac.zip
          unzip -j ffprobe_mac.zip -d ffmpeg/
          chmod +x ffmpeg/ffmpeg ffmpeg/ffprobe
        fi

    # 构建 Windows 版本
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconsole --onefile --name "VideoTool" ffmpeg_tool.pyw

    # 构建 macOS 版本
    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --windowed --name "VideoTool" ffmpeg_tool.pyw

    # 整理并打包成 ZIP（包含 ffmpeg 文件夹以符合代码路径逻辑）
    - name: Zip for Release
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          mkdir VideoTool_Win
          cp dist/VideoTool.exe VideoTool_Win/
          cp -r ffmpeg VideoTool_Win/
          zip -r VideoTool-Win.zip VideoTool_Win/
        else
          mkdir VideoTool_Mac
          cp -r dist/VideoTool.app VideoTool_Mac/
          cp -r ffmpeg VideoTool_Mac/
          zip -r VideoTool-Mac.zip VideoTool_Mac/
        fi

    # 发布到 Release 页面
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          VideoTool-Win.zip
          VideoTool-Mac.zip
        generate_release_notes: true